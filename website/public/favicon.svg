<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- the plugin icon's language, redrawn as vector: a green tile, a walkable ring,
       orange built blocks on the accessible ring, a white centrality node -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#73c04a"/>
      <stop offset="1" stop-color="#3e8e34"/>
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="13" fill="url(#tile)"/>
  <circle cx="32" cy="32" r="17" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2.4"/>
  <circle cx="32" cy="32" r="9.5" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2"/>
  <rect x="44.5" y="22.7" width="7" height="7" rx="1.6" fill="#c55611"/>
  <rect x="22.7" y="12.5" width="7" height="7" rx="1.6" fill="#c55611"/>
  <rect x="12.5" y="34.3" width="7" height="7" rx="1.6" fill="#c55611"/>
  <rect x="34.3" y="44.5" width="7" height="7" rx="1.6" fill="#c55611"/>
  <circle cx="32" cy="32" r="5.6" fill="#ffffff"/>
  <circle cx="32" cy="32" r="2.3" fill="#c55611"/>
</svg>
